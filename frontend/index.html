      <div class="rv-detail-type" style="color:var(--accent)">line item</div>
      <div class="rv-detail-id">Item ${item.sales_order_item||'—'}</div>
      <div style="font-size:11px;color:var(--text-2);font-family:var(--font-m);margin-top:2px">${(item.material_desc||item.material_id||'').slice(0,36)}</div>
      ${iCan?`<div style="margin-top:6px"><span class="badge b-cancelled">Cancelled</span></div>`:''}
      ${iRej?`<div style="margin-top:4px"><span class="badge b-danger">Rejected: ${item.rejection_reason}</span></div>`:''}
    </div>
    <div class="rv-fields">
      ${fields.map(fld=>`
        <div class="rv-field">
          <span class="rv-fkey">${fld.k}</span>
          <span class="rv-fval" style="${fldColor(fld.cls||'')}">${fld.v||'—'}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function rvTimeline(order, items) {
  const stage = order.lifecycle_stage;
  const isCan = stage === 'cancelled';
  const item0 = items[0]||{};
  return [
    { stage:'Sales order', date:f.date(order.order_created_date),      cls:'done', days:null },
    { stage:'Delivery',    date:f.date(item0.delivery_created_date),    cls:['delivered','billed','paid','cancelled'].includes(stage)?(isCan?'err':'done'):'active',
      days:f.days(order.order_to_delivery_days)!=='—'?f.days(order.order_to_delivery_days)+' from order':null },
    { stage:'Billing',     date:f.date(item0.billing_date),             cls:isCan?'err':['billed','paid'].includes(stage)?'done':'',
      days:f.days(order.delivery_to_billing_days)!=='—'?f.days(order.delivery_to_billing_days)+' from delivery':null },
    { stage:'Payment',     date:f.date(item0.payment_posting_date),     cls:stage==='paid'?'done':stage==='billed'?'active':'',
      days:f.days(order.billing_to_payment_days)!=='—'?f.days(order.billing_to_payment_days)+' from billing':null },
  ];
}

// ── RV AI Chat ────────────────────────────────────────────
function rvAsk(q) {
  const inp = document.getElementById('rv-ai-inp');
  if (inp) { inp.value = q; rvSendAI(); }
}

async function rvSendAI() {
  const inp  = document.getElementById('rv-ai-inp');
  const msgs = document.getElementById('rv-ai-msgs');
  const btn  = document.getElementById('rv-ai-btn');
  const q = inp?.value?.trim();
  if (!q || !msgs) return;
  if (!RV.orderId) { rvAppendMsg('a','Select an order first.',msgs); return; }
  inp.value = '';
  rvAppendMsg('u', q, msgs);
  btn.disabled = true;
  const t = rvAppendMsg('a','<div class="spinner" style="width:12px;height:12px"></div>', msgs);

  if (D.backendOnline) {
    try {
      const order = D.orders?.find(o=>String(o.sales_order_id)===String(RV.orderId));
      const ctx = rvBuildCtx(order, RV.items, RV.orderId);
      const res = await apiPost('/api/ai/query', {question:`Order ${RV.orderId}: ${q}\n\nContext:\n${ctx}`});
      const tag = res.model_used?`<span style="font-size:9px;color:var(--text-3);font-family:var(--font-m);margin-top:4px;display:block">via ${res.model_used}${res.cached?' · cached':''}</span>`:'';
      t.innerHTML = (res.answer||'No response.')+tag;
      btn.disabled=false; msgs.scrollTop=msgs.scrollHeight; return;
    } catch(e) {}
  }

  await new Promise(r=>setTimeout(r,600+Math.random()*500));
  const order = D.orders?.find(o=>String(o.sales_order_id)===String(RV.orderId));
  t.innerHTML = rvLocalAnswer(q, order, RV.items, RV.orderId)
    + '<span style="font-size:9px;color:var(--text-3);font-family:var(--font-m);margin-top:4px;display:block">local mode</span>';
  btn.disabled=false; msgs.scrollTop=msgs.scrollHeight;
}

function rvAppendMsg(role, html, container) {
  const el=document.createElement('div');
  el.className=`rv-bubble ${role}`;
  el.innerHTML=html;
  container.appendChild(el);
  container.scrollTop=container.scrollHeight;
  return el;
}

function rvBuildCtx(order, items, id) {
  if (!order) return `Order ${id}: data unavailable`;
  const dels=[...new Set(items.map(i=>i.delivery_id).filter(rvReal))];
  const bils=[...new Set(items.map(i=>i.billing_doc_id).filter(rvReal))];
  const accs=[...new Set(items.map(i=>i.accounting_document).filter(rvReal))];
  const i0=items[0]||{};
  const flags=rvComputeFlags(order,items);
  return [
    `ORDER: ${order.sales_order_id} | Customer: ${order.customer_name||order.customer_id}`,
    `Amount: ₹${order.order_total_net_amount} | Paid: ₹${order.total_paid_amount||0} | Stage: ${order.lifecycle_stage}`,
    `Terms: ${order.payment_terms} (Net ${order.expected_payment_days||30}d)`,
    `ENTITIES: Delivery=${dels[0]||'none'} | Billing=${bils[0]||'none'} | Payment=${accs[0]||'none'}`,
    `DATES: Created=${String(order.order_created_date||'').slice(0,10)} | Del=${String(i0.delivery_created_date||'').slice(0,10)} | Bil=${String(i0.billing_date||'').slice(0,10)} | Pay=${String(i0.payment_posting_date||'').slice(0,10)}`,
    `CYCLE: O→D=${order.order_to_delivery_days||'—'}d | D→B=${order.delivery_to_billing_days||'—'}d | B→P=${order.billing_to_payment_days||'—'}d`,
    `FLAGS (${flags.length}): ${flags.length?flags.map(f=>`${f.label}[${f.fk}=${f.fv}]`).join(' | '):'none'}`,
    `BOOLEANS: cancelled=${order.is_billing_cancelled} delayed=${order.is_delivery_delayed} unpaid=${order.is_unpaid} missing=${order.missing_stage}`,
    `ITEMS (${items.length}): ${items.slice(0,3).map(i=>`Item${i.sales_order_item}:${(i.material_desc||i.material_id||'').slice(0,20)}=₹${i.item_net_amount}`).join(' | ')}`,
  ].join('\n');
}

function rvLocalAnswer(q, order, items, id) {
  if (!order) return `Order <strong>${id}</strong> not in local data.`;
  const ql=q.toLowerCase(), stage=order.lifecycle_stage, isCan=stage==='cancelled';
  const cust=(order.customer_name||order.customer_id||'').split(',')[0];
  const amt=rvFmtCurrency(order.order_total_net_amount);
  const i0=items[0]||{};
  const flags=rvComputeFlags(order,items);
  const flagNames=flags.map(f=>f.label.toLowerCase());
  const o2d=Number(order.order_to_delivery_days);
  const d2b=Number(order.delivery_to_billing_days);
  const b2p=Number(order.billing_to_payment_days);

  if (ql.includes('delay')||ql.includes('late')||ql.includes('slow')||ql.includes('stuck')) {
    if (isCan) return `Order <strong>${id}</strong> was <strong>cancelled</strong>. Rule: <code>is_billing_cancelled=True</code>. Billing doc ${rvFmt(i0.billing_doc_id||'—')} reversed.`;
    if (stage==='ordered') return `Order <strong>${id}</strong> stuck at <strong>Ordered</strong>. Rule: <code>missing_stage=True</code>. No delivery since ${rvFmtDate(order.order_created_date)}. Check plant ${i0.plant||'—'}.`;
    if (rvReal(order.order_to_delivery_days)&&!isNaN(o2d)&&o2d>RV_THRESHOLDS.DELIVERY_DELAY_DAYS)
      return `Delivery took <strong>${Math.round(o2d)}d</strong>. Rule: <code>order_to_delivery_days (${Math.round(o2d)}) &gt; ${RV_THRESHOLDS.DELIVERY_DELAY_DAYS}d threshold</code>. Delivery ID: ${rvFmt(i0.delivery_id||'—')}, plant: ${i0.delivery_plant||i0.plant||'—'}.`;
    if (rvReal(order.delivery_to_billing_days)&&!isNaN(d2b)&&d2b>RV_THRESHOLDS.BILLING_DELAY_DAYS)
      return `Billing delay: <strong>${Math.round(d2b)}d</strong>. Rule: <code>delivery_to_billing_days (${Math.round(d2b)}) &gt; ${RV_THRESHOLDS.BILLING_DELAY_DAYS}d</code>. Billing doc: ${rvFmt(i0.billing_doc_id||'—')}.`;
    return `No delay for order <strong>${id}</strong>. O→D: ${rvFmtDays(order.order_to_delivery_days)}, D→B: ${rvFmtDays(order.delivery_to_billing_days)}.`;
  }

  if (ql.includes('payment')||ql.includes('paid')||ql.includes('invoice')) {
    if (stage==='paid') return `Order <strong>${id}</strong> (${amt}) <strong>fully paid</strong>. Rule: <code>lifecycle_stage=paid</code>. Cleared in ${rvFmtDays(order.billing_to_payment_days)} after billing. Acct: ${rvFmt(i0.accounting_document||'—')}.`;
    if (flagNames.some(n=>n.includes('unpaid'))) return `Open invoice for <strong>${id}</strong>. Rule: <code>is_unpaid=True</code>. Billed ${rvFmtDate(i0.billing_date)}, doc ${rvFmt(i0.billing_doc_id||'—')}. Due: ${amt}. Terms: ${order.payment_terms} (Net ${order.expected_payment_days||30}d).`;
    if (flagNames.some(n=>n.includes('overdue'))) return `Payment overdue. Rule: <code>billing_to_payment_days (${Math.round(b2p)}d) &gt; ${order.expected_payment_days||30}d terms</code>.`;
    if (isCan) return `No payment — billing cancelled. Rule: <code>is_billing_cancelled=True</code>.`;
    return `Order <strong>${id}</strong> at <em>${stage}</em>. Amount: ${amt}.`;
  }

  if (ql.includes('cancel')) {
    if (isCan) return `Order <strong>${id}</strong>: <strong>billing cancelled</strong>. Rule: <code>is_billing_cancelled=True</code>. Doc ${rvFmt(i0.billing_doc_id||'—')} reversed. <em>${cust}</em> has 48/56 total cancellations.`;
    return `Not cancelled. Rule: <code>is_billing_cancelled=False</code>. Stage: <strong>${stage}</strong>.`;
  }

  if (ql.includes('flag')||ql.includes('issue')||ql.includes('problem')) {
    if (!flags.length) return `No flags for <strong>${id}</strong> — lifecycle clean. Stage: <em>${stage}</em>.`;
    return `<strong>${id}</strong> has ${flags.length} flag${flags.length>1?'s':''}:<br/><br/>`+flags.map(f=>`• <strong>${f.label}</strong>: ${f.explanation.replace(/<[^>]+>/g,'')}`).join('<br/>');
  }

  if (ql.includes('summar')||ql.includes('status')||ql.includes('overview')) {
    const fs=flags.length?flags.map(f=>`<em>${f.label}</em>`).join(', '):'none';
    return `<strong>Order ${id}</strong> · <em>${order.customer_name||order.customer_id}</em><br/>
${amt} · <strong>${stage}</strong><br/>
Del: ${rvFmt(i0.delivery_id||'—')} · Bil: ${rvFmt(i0.billing_doc_id||'—')} · Acct: ${rvFmt(i0.accounting_document||'—')}<br/>
O→D: ${rvFmtDays(order.order_to_delivery_days)} · D→B: ${rvFmtDays(order.delivery_to_billing_days)} · B→P: ${rvFmtDays(order.billing_to_payment_days)}<br/>
Flags (${flags.length}): ${fs}`;
  }

  return `Order <strong>${id}</strong> · <em>${cust}</em> · ${amt} · <strong>${stage}</strong>. Flags: ${flags.length?flags.map(f=>f.label).join(', '):'none'}.`;
}

async function boot(){
  try{
    await loadData();
    await go('dashboard');
  }catch(e){
    document.getElementById('page-body').innerHTML=`
      <div style="padding:80px;text-align:center;color:var(--text-2)">
        <div style="font-size:40px;margin-bottom:16px">⚠</div>
        <div style="font-family:var(--font-d);font-size:18px;margin-bottom:8px">Could not load data</div>
        <div style="font-size:12px;font-family:var(--font-m);color:var(--text-3);margin-bottom:16px">${e.message}</div>
        <div style="font-size:12px;color:var(--text-3)">Start a local HTTP server from the project root:<br/><br/>
          <code style="font-family:var(--font-m);color:var(--accent-2);font-size:13px">python -m http.server 8080</code><br/>
          <span style="font-size:11px">then open http://localhost:8080/frontend/</span>
        </div>
      </div>`;
  }
}
boot();
